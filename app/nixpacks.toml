# nixpacks.toml — Railway build config
# Uses @sparticuz/chromium-min which bundles its own Chromium binary + libs.
# No system packages or playwright browser install required.

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "next start -p ${PORT:-3000}"

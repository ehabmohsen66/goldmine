# Railway multi-service configuration
# Automatically sets up both Next.js app AND Python Kronos engine from one repo push.
# See: https://docs.railway.com/reference/config-as-code

[services.app]
root = "app"

[services.app.build]
builder = "nixpacks"
nixpacksConfigPath = "nixpacks.toml"

[services.app.deploy]
startCommand = "next start -p $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[services.kronos-engine]
root = "python-engine"

[services.kronos-engine.build]
builder = "nixpacks"

[services.kronos-engine.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
